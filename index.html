<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Патанатомия — Умный Тренажер</title>
    <style>
        :root {
            --primary: #2196F3;
            --success: #4CAF50;
            --accent: #FF9800;
            --bg: #1e1e24; 
            --card-bg: #2a2a35;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Панель настроек */
        .settings-panel {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .inputs-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        input[type="number"] {
            width: 55px;
            padding: 6px;
            border: 1px solid #444;
            background: #151518;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }
        .btn-apply { background-color: var(--accent); color: white; }
        .btn-apply:hover { background-color: #e68a00; }

        /* Статус бар */
        .status-bar {
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            color: #aaa;
        }

        /* Окно просмотра */
        .view-port {
            background: #151518;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65vh;
            min-height: 400px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Кнопка действия */
        .btn-action {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            color: white;
            border-radius: 8px;
            background-color: var(--primary);
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }
        .btn-action:hover { background-color: #1976D2; }
        
        .btn-action.next {
            background-color: var(--success);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .btn-action.next:hover { background-color: #388E3C; }
    </style>
</head>
<body>

<div class="container">
    <div class="settings-panel">
        <div class="inputs-group">
            <label>Диапазон от:</label>
            <input type="number" id="startNum" value="2">
            <label>до:</label>
            <input type="number" id="endNum" value="77">
        </div>
        
        <label class="checkbox-group">
            <input type="checkbox" id="allowRepeats">
            <span>Разрешить повторы</span>
        </label>

        <button class="btn-apply" onclick="applySettings()">Применить и сбросить</button>
    </div>

    <div class="status-bar" id="statusBar">Загрузка манифеста картинок...</div>

    <div class="view-port">
        <canvas id="quizCanvas"></canvas>
    </div>

    <button id="btnAction" class="btn-action" onclick="handleAction()">Показать ответ (Пробел)</button>
</div>

<script>
    let allImages = [];       
    let filteredImages = [];  
    let remainingImages = []; 
    
    let currentImageSrc = "";
    let currentImgObj = null; 
    let isShowingFull = false;

    const canvas = document.getElementById('quizCanvas');
    const ctx = canvas.getContext('2d');

    function parseFileNumber(filename) {
        const match = filename.match(/(\d+)\.(?:jpg|jpeg|png|bmp)$/i);
        return match ? parseInt(match[1], 10) : null;
    }

    // Загрузка манифеста
    fetch('manifest.json')
        .then(response => {
            if (!response.ok) throw new Error();
            return response.json();
        })
        .then(data => {
            allImages = data;
            applySettings();
        })
        .catch(() => {
            document.getElementById('statusBar').innerText = "Ошибка: не найден файл manifest.json. Сгенерируйте его!";
        });

    function applySettings() {
        const startNum = parseInt(document.getElementById('startNum').value, 10) || 0;
        const endNum = parseInt(document.getElementById('endNum').value, 10) || 99999;

        filteredImages = allImages.filter(filename => {
            const num = parseFileNumber(filename);
            return num !== null ? (num >= startNum && num <= endNum) : false;
        });

        if (filteredImages.length === 0) {
            alert("В заданном диапазоне микропрепараты не найдены!");
            return;
        }

        remainingImages = [...filteredImages];
        nextQuestion();
    }

    function updateStatusBar() {
        const allowRepeats = document.getElementById('allowRepeats').checked;
        const statusEl = document.getElementById('statusBar');

        if (allowRepeats) {
            statusEl.innerText = `Режим бесконечных повторов | Слайдов в пуле: ${filteredImages.length}`;
        } else {
            const currentLeft = remainingImages.length + (!isShowingFull && currentImageSrc ? 1 : 0);
            statusEl.innerText = `Режим без повторов | Осталось: ${currentLeft} из ${filteredImages.length}`;
        }
    }

    // Функция точной отрисовки/обрезки кадра
    function draw() {
        if (!currentImgObj) return;

        const imgW = currentImgObj.width;
        const imgH = currentImgObj.height;

        if (!isShowingFull) {
            // РЕЖИМ ВОПРОСА: Отрезаем ровно по синюю рамку препарата (~43.5% ширины)
            const cropWidth = Math.floor(imgW * 0.435); 
            // Срезаем верхние 18% кадра (убираем текстовый заголовок с названием диагноза)
            const cropTop = Math.floor(imgH * 0.18);
            const cropHeight = imgH - cropTop;

            canvas.width = cropWidth;
            canvas.height = cropHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(
                currentImgObj, 
                0, cropTop, cropWidth, cropHeight, 
                0, 0, cropWidth, cropHeight       
            );
        } else {
            // РЕЖИМ ОТВЕТА: Показываем весь слайд с текстом целиком
            canvas.width = imgW;
            canvas.height = imgH;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImgObj, 0, 0);
        }
    }

    function nextQuestion() {
        const allowRepeats = document.getElementById('allowRepeats').checked;
        const btnEl = document.getElementById('btnAction');

        if (!allowRepeats) {
            if (remainingImages.length === 0) {
                alert("Все выбранные препараты пройдены! Начинаем новый круг.");
                remainingImages = [...filteredImages];
            }
            const randIndex = Math.floor(Math.random() * remainingImages.length);
            currentImageSrc = remainingImages.splice(randIndex, 1)[0];
        } else {
            const randIndex = Math.floor(Math.random() * filteredImages.length);
            currentImageSrc = filteredImages[randIndex];
        }

        isShowingFull = false;
        updateStatusBar();

        // Загружаем картинку в буфер памяти, затем рендерим на холст
        currentImgObj = new Image();
        currentImgObj.onload = function() {
            draw();
        };
        currentImgObj.src = currentImageSrc; 
        
        btnEl.innerText = "Показать ответ (Пробел)";
        btnEl.className = "btn-action";
    }

    function showAnswer() {
        isShowingFull = true;
        draw();
        updateStatusBar();

        const btnEl = document.getElementById('btnAction');
        btnEl.innerText = "Следующая картинка (Пробел)";
        btnEl.className = "btn-action next";
    }

    function handleAction() {
        if (isShowingFull) {
            nextQuestion();
        } else {
            showAnswer();
        }
    }

    // Слушатель Пробела
    window.addEventListener('keydown', function(e) {
        if (e.code === 'Space') {
            e.preventDefault(); 
            handleAction();
        }
    });

    document.getElementById('allowRepeats').addEventListener('change', function() {
        if (!this.checked) {
            remainingImages = [...filteredImages];
            const index = remainingImages.indexOf(currentImageSrc);
            if (index > -1) remainingImages.splice(index, 1);
        }
        updateStatusBar();
    });

    // Перерисовываем при ресайзе окна, чтобы не плыли пиксели
    window.addEventListener('resize', draw);
</script>

</body>
</html>
